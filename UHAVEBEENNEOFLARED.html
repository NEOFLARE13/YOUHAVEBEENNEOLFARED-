<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainbow You HAvE BeEn NeoFLared!</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #222; /* Dark background to make rainbow pop */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  @keyframes rainbow {
    0% { color: #ff0000; }
    16% { color: #ff7f00; }
    33% { color: #ffff00; }
    50% { color: #00ff00; }
    66% { color: #0000ff; }
    83% { color: #4b0082; }
    100% { color: #8b00ff; }
  }

  .rainbow-text {
    font-size: 5rem;
    font-weight: bold;
    animation: rainbow 3s infinite linear;
    text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
  }
</style>
</head>
<body>

  <div class="rainbow-text">You HAvE BeEn NeoFLared!</div>

</body>
</html>
